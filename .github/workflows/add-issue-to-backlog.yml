name: Add issue to Dev Backlog

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/schmiesingdev/projects/1
          github-token: ${{ secrets.GITHUB_TOKEN }}
